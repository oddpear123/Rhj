services:
  db:
    image: postgres:16-alpine
    container_name: rhj_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecretpassword}
      POSTGRES_DB: ${POSTGRES_DB:-rhj_database}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-rhj_database}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env.production
    depends_on:
      db:
        condition: service_healthy
    # Port 8000 is internal only; Nginx proxies to it via service name

  frontend:
    build: ./frontend
    env_file: ./frontend/.env.production
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
