<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        /* Default: Pretty Princess Theme */
        :root {
            --bg-color: #ffe6ea;
            --text-color: #ff3366;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: #ffb3c6;
            --shadow-color: rgba(255, 179, 198, 0.6);
            --hover-bg: #ffb3c6;
            --hover-text: #fff;
            --font-family: 'Inter', sans-serif;
            --transition-speed: 0.8s;
            --glitch-opacity: 0;
            --image-filter: grayscale(0%) sepia(20%) hue-rotate(320deg);
        }

        /* Toggled: Barbie Demon Theme */
        [data-theme="demon"] {
            --bg-color: #0f0f0f;
            --text-color: #ff0033;
            --card-bg: rgba(20, 0, 5, 0.8);
            --card-border: #ff0033;
            --shadow-color: rgba(255, 0, 51, 0.8);
            --hover-bg: #ff0033;
            --hover-text: #000;
            --glitch-opacity: 1;
            --image-filter: grayscale(100%) contrast(150%) sepia(100%) hue-rotate(330deg) saturate(300%);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
            overflow-x: hidden;
            position: relative;
            background-image: url('https://pbs.twimg.com/media/GT6tEUWb0AMFRyN');
        }

        /* Floating background particles for princess mode */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4) 0%, transparent 60%);
            opacity: calc(1 - var(--glitch-opacity));
            transition: opacity var(--transition-speed);
            z-index: -1;
            animation: float 6s infinite ease-in-out;
        }

        /* Scanlines for demon mode */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 0, 51, 0.1) 3px, rgba(255, 0, 51, 0.1) 3px);
            opacity: var(--glitch-opacity);
            transition: opacity var(--transition-speed);
            pointer-events: none;
            z-index: 999;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            z-index: 10;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            background-image: url('https://ugc.production.linktr.ee/d71ebae8-a001-483a-aa09-a6ae0d842111_6AngKleAEBh9WZKVzbKgAA52kKV2.jpeg?io=true&size=thumbnail-stack_v1_0');
            background-size: cover;
            background-position: center;
            border: 3px solid var(--card-border);
            box-shadow: 0 0 15px var(--shadow-color);
            transition: all var(--transition-speed) ease;
            filter: var(--image-filter);
        }

        .profile-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 60px;
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 30px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease, border-color var(--transition-speed), background var(--transition-speed);
            backdrop-filter: blur(5px);
        }

        .link-card:hover {
            transform: translateY(-3px) scale(1.02);
            background: var(--hover-bg);
            color: var(--hover-text);
            box-shadow: 0 8px 25px var(--shadow-color);
        }

        /* The demon glitch hover effect */
        [data-theme="demon"] .link-card:hover {
            animation: shake 0.3s infinite;
            text-shadow: 2px 2px 0px #00f, -2px -2px 0px #f00;
        }

        .link-text {
            position: relative;
            z-index: 2;
            padding: 0 2rem;
            text-align: center;
        }

        .theme-toggle {
            margin-top: 3rem;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s;
            text-transform: lowercase;
            letter-spacing: 2px;
        }

        .theme-toggle:hover {
            opacity: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -2px) rotate(-1deg); }
            50% { transform: translate(-3px, 0px) rotate(1deg); }
            75% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -1px) rotate(0deg); }
        }

        :root {
            /* Base Princess Theme */
            --bg-color: #ffe6ea;
            --text-color: #ff3366;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: #ffb3c6;
            --shadow-color: rgba(255, 179, 198, 0.6);
            --btn-bg: #ff3366;
            --btn-text: #fff;
            
            /* Progressive variables */
            --transition-speed: 1s;
            --image-filter: none;
            --vignette: transparent;
            --crt-opacity: 0;
            --shake-intensity: 0px;
        }

        body {
            margin: 0; padding: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: var(--vignette);
        }

        /* Progressive Scanlines */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 0, 51, 0.15) 3px, rgba(0, 0, 0, 0.2) 3px);
            opacity: var(--crt-opacity);
            transition: opacity var(--transition-speed);
            pointer-events: none;
            z-index: 998;
        }

        .header {
            text-align: center;
            z-index: 10;
            margin-bottom: 2rem;
            transform: translate(var(--shake-intensity), var(--shake-intensity));
        }

        .profile-pic {
            width: 150px; height: 150px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            background-image: url('https://ugc.production.linktr.ee/d71ebae8-a001-483a-aa09-a6ae0d842111_6AngKleAEBh9WZKVzbKgAA52kKV2.jpeg?io=true&size=thumbnail-stack_v1_0');
            background-size: cover; background-position: center;
            border: 4px solid var(--card-border);
            box-shadow: 0 0 30px var(--shadow-color);
            filter: var(--image-filter);
            transition: all 0.5s ease;
        }

        /* The central interaction button */
        .give-in-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 1.5rem 3rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px var(--shadow-color);
            transition: all 0.3s ease;
            animation: breathe 2s infinite;
        }

        .give-in-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px var(--shadow-color);
        }

        /* Hidden Admin/Wishlist Panel */
        .vault-panel {
            display: none;
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 40px var(--shadow-color);
            backdrop-filter: blur(12px);
            z-index: 10;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s forwards;
        }

        .vault-panel.active {
            display: block;
        }

        /* UI Animations */
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes violent-shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-2px, -2px) rotate(-1deg); }
            50% { transform: translate(3px, 0px) rotate(1deg); }
            75% { transform: translate(-1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -1px) rotate(0deg); }
        }

        .img-container {
            display: grid;
            /* Forces exactly 2 columns of equal width */
            grid-template-columns: repeat(2, 1fr);
            /* Optional: space between the photos */
            gap: 10px; 
            /* Forces the container to wrap tightly around the images */
            width: fit-content; 
            margin: 0 auto; /* Centers the whole block on the page */
        }

        .grid-item {
            /* Using flex removes that annoying invisible 4px gap browsers put under inline images */
            display: flex; 
        }

        .grid-item img {
            /* Makes the images responsive within their grid cells */
            max-width: 100%;
            height: auto;
            /* Optional: if your images are different sizes, use this to crop them into perfect squares without distortion */
            /* aspect-ratio: 1 / 1; */
            /* object-fit: cover; */
        }
    </style>
</head>
<body>

    <div class="header" id="mainHeader">
        <div class="profile-pic" id="avatar"></div>
        <h1 id="mainTitle">Sav 💕</h1>
        <p id="subTitle" style="opacity: 0.7;">You have to earn access.</p>
        <br>
        <button class="give-in-btn" id="giveInBtn" onclick="progressState()">Surrender</button>
    </div>

    <div class="vault-panel" id="vaultPanel">
        <h2 style="text-align: center; margin-bottom: 2rem;">The Vault is Open, Good puppy</h2>
        <a href="https://throne.com/redhotjugs" target="_blank" class="link-card">
            <span class="link-text">Throne | My Wishlist</span>
        </a>

        <a href="https://onlyfans.com/redhotjugs" class="link-card">
            <span class="link-text">Spicy 🌶️</span>
        </a>

        <a href="https://www.instagram.com/redhotjugs" target="_blank" class="link-card">
            <span class="link-text">Instagram</span>
        </a>

        <a href="http://twitter.com/redhotjugs" target="_blank" class="link-card">
            <span class="link-text">Twitter</span>
        </a>

        <a href="http://cash.app/$Sassysavvv" target="_blank" class="link-card">
            <span class="link-text">Cashapp ✨</span>
        </a>

        <div class="img-container">
            <div class="grid-item">
                <img src="https://pbs.twimg.com/media/GYBPylnb0AMEZg4?format=jpg" />
            </div>
            <div class="grid-item">
                <img src="https://pbs.twimg.com/media/GYxXMuhbQAQRmQu?format=jpg&name=900x900" />
            </div>
            </div>
            <div class="grid-item">
                <img src="https://pbs.twimg.com/media/GVdM0DrXwAIEpC6?format=jpg&name=medium" />
            </div>
            <div class="grid-item">
                <img src="https://pbs.twimg.com/media/GKie1IdaEAAkxwO?format=jpg&name=small" />
            </div>
        </div>
    </div>

    <script>
        // State Machine
        let currentState = 0;
        const maxStates = 3;
        
        // Tone.js Audio Elements
        let isAudioInitialized = false;
        let synth, distortion, autoFilter, droneGain;

        async function initAudio() {
            if (isAudioInitialized) return;
            
            await Tone.start();
            
            // Build the audio chain
            distortion = new Tone.Distortion(0).toDestination();
            autoFilter = new Tone.AutoFilter("4n").connect(distortion);
            droneGain = new Tone.Gain(0).connect(autoFilter);
            
            // Deep, low FM Synth for the background drone
            synth = new Tone.FMSynth({
                harmonicity: 1.5,
                modulationIndex: 2,
                oscillator: { type: "triangle" },
                modulation: { type: "square" }
            }).connect(droneGain);

            synth.triggerAttack("C1");
            autoFilter.start();
            isAudioInitialized = true;
        }

        function updateAudioState() {
            if (!isAudioInitialized) return;
            
            // Increase intensity based on state
            const intensity = currentState / maxStates;
            
            // Ramp up volume, distortion, and modulation
            droneGain.gain.rampTo(intensity * 0.6, 1);
            distortion.distortion = intensity * 0.8;
            synth.modulationIndex.rampTo(2 + (intensity * 20), 1);
            autoFilter.frequency.value = (intensity * 8) + "n";
        }

        function updateUIState() {
            const root = document.documentElement;
            const intensity = currentState / maxStates;

            // Shift colors progressively
            if (currentState === 1) {
                root.style.setProperty('--bg-color', '#ff99aa');
                root.style.setProperty('--vignette', 'inset 0 0 50px rgba(255, 0, 51, 0.1)');
                document.getElementById('subTitle').innerText = "A little further...";
            } else if (currentState === 2) {
                root.style.setProperty('--bg-color', '#4a0011');
                root.style.setProperty('--text-color', '#ff0033');
                root.style.setProperty('--card-border', '#ff0033');
                root.style.setProperty('--btn-bg', '#ff0033');
                root.style.setProperty('--btn-text', '#000');
                root.style.setProperty('--crt-opacity', '0.5');
                root.style.setProperty('--vignette', 'inset 0 0 100px rgba(255, 0, 51, 0.4)');
                document.getElementById('subTitle').innerText = "Almost there.";
                document.getElementById('mainHeader').style.animation = "violent-shake 0.2s infinite";
            } else if (currentState === 3) {
                root.style.setProperty('--bg-color', '#050002');
                root.style.setProperty('--card-bg', 'rgba(15, 0, 5, 0.9)');
                root.style.setProperty('--crt-opacity', '1');
                root.style.setProperty('--vignette', 'inset 0 0 150px rgba(255, 0, 51, 0.6)');
                root.style.setProperty('--image-filter', 'grayscale(100%) contrast(180%) sepia(100%) hue-rotate(330deg) saturate(300%)');
                
                // Final UI changes
                document.getElementById('mainHeader').style.animation = "none";
                document.getElementById('giveInBtn').style.display = "none";
                document.getElementById('subTitle').innerText = "Access Granted.";
                document.getElementById('avatar').style.animation = "breathe 1s infinite";
                
                // Reveal the Vault
                document.getElementById('vaultPanel').classList.add('active');
            }
        }

        async function progressState() {
            if (currentState < maxStates) {
                if (!isAudioInitialized) {
                    await initAudio();
                }
                currentState++;
                updateAudioState();
                updateUIState();
            }
        }
    </script>
</body>
</html>
