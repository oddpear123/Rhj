<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        /* Default: Pretty Princess Theme */
        :root {
            --bg-color: #ffe6ea;
            --text-color: #ff3366;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: #ffb3c6;
            --shadow-color: rgba(255, 179, 198, 0.6);
            --hover-bg: #ffb3c6;
            --hover-text: #fff;
            --font-family: 'Inter', sans-serif;
            --transition-speed: 0.8s;
            --glitch-opacity: 0;
            --image-filter: grayscale(0%) sepia(20%) hue-rotate(320deg);
        }

        /* Toggled: Demon Theme */
        [data-theme="demon"] {
            --bg-color: #0f0f0f;
            --text-color: #ff0033;
            --card-bg: rgba(20, 0, 5, 0.8);
            --card-border: #ff0033;
            --shadow-color: rgba(255, 0, 51, 0.8);
            --hover-bg: #ff0033;
            --hover-text: #000;
            --glitch-opacity: 1;
            --image-filter: grayscale(100%) contrast(150%) sepia(100%) hue-rotate(330deg) saturate(300%);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
            overflow-x: hidden;
            position: relative;
            background-image: url('https://pbs.twimg.com/media/GT6tEUWb0AMFRyN');
        }

        /* Floating background particles for princess mode */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4) 0%, transparent 60%);
            opacity: calc(1 - var(--glitch-opacity));
            transition: opacity var(--transition-speed);
            z-index: -1;
            animation: float 6s infinite ease-in-out;
        }

        /* Scanlines for demon mode */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 0, 51, 0.1) 3px, rgba(255, 0, 51, 0.1) 3px);
            opacity: var(--glitch-opacity);
            transition: opacity var(--transition-speed);
            pointer-events: none;
            z-index: 999;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            z-index: 10;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 2rem auto;
            background-image: url('https://ugc.production.linktr.ee/d71ebae8-a001-483a-aa09-a6ae0d842111_6AngKleAEBh9WZKVzbKgAA52kKV2.jpeg?io=true&size=thumbnail-stack_v1_0');
            background-size: cover;
            background-position: center;
            border: 3px solid var(--card-border);
            box-shadow: 0 0 15px var(--shadow-color);
            transition: all var(--transition-speed) ease;
            filter: var(--image-filter);
        }

        .profile-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 60px;
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 30px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease, border-color var(--transition-speed), background var(--transition-speed);
            backdrop-filter: blur(5px);
        }

        .link-card:hover {
            transform: translateY(-3px) scale(1.02);
            background: var(--hover-bg);
            color: var(--hover-text);
            box-shadow: 0 8px 25px var(--shadow-color);
        }

        /* The demon glitch hover effect */
        [data-theme="demon"] .link-card:hover {
            animation: shake 0.3s infinite;
            text-shadow: 2px 2px 0px #00f, -2px -2px 0px #f00;
        }

        .link-text {
            position: relative;
            z-index: 2;
            padding: 0 2rem;
            text-align: center;
        }

        .theme-toggle {
            margin-top: 3rem;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s;
            text-transform: lowercase;
            letter-spacing: 2px;
        }

        .theme-toggle:hover {
            opacity: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -2px) rotate(-1deg); }
            50% { transform: translate(-3px, 0px) rotate(1deg); }
            75% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -1px) rotate(0deg); }
        }

        :root {
            /* Base Princess Theme */
            --bg-color: #ffe6ea;
            --text-color: #ff3366;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: #ffb3c6;
            --shadow-color: rgba(255, 179, 198, 0.6);
            --btn-bg: #ff3366;
            --btn-text: #fff;
            
            /* Progressive variables */
            --transition-speed: 1s;
            --image-filter: none;
            --vignette: transparent;
            --crt-opacity: 0;
            --shake-intensity: 0px;
        }

        body {
            margin: 0; padding: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: var(--vignette);
        }

        /* Progressive Scanlines */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 0, 51, 0.15) 3px, rgba(0, 0, 0, 0.2) 3px);
            opacity: var(--crt-opacity);
            transition: opacity var(--transition-speed);
            pointer-events: none;
            z-index: 998;
        }

        .header {
            text-align: center;
            z-index: 10;
            margin-bottom: 2rem;
            transform: translate(var(--shake-intensity), var(--shake-intensity));
        }

        .profile-pic {
            width: 150px; height: 150px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            background-image: url('https://ugc.production.linktr.ee/d71ebae8-a001-483a-aa09-a6ae0d842111_6AngKleAEBh9WZKVzbKgAA52kKV2.jpeg?io=true&size=thumbnail-stack_v1_0');
            background-size: cover; background-position: center;
            border: 4px solid var(--card-border);
            box-shadow: 0 0 30px var(--shadow-color);
            filter: var(--image-filter);
            transition: all 0.5s ease;
        }

        /* The central interaction button */
        .give-in-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 1.5rem 3rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px var(--shadow-color);
            transition: all 0.3s ease;
            animation: breathe 2s infinite;
        }

        .give-in-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px var(--shadow-color);
        }

        /* Hidden Admin/Wishlist Panel */
        .vault-panel {
            display: none;
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 40px var(--shadow-color);
            backdrop-filter: blur(12px);
            z-index: 10;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s forwards;
        }

        .vault-panel.active {
            display: block;
        }

        /* UI Animations */
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes violent-shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-2px, -2px) rotate(-1deg); }
            50% { transform: translate(3px, 0px) rotate(1deg); }
            75% { transform: translate(-1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -1px) rotate(0deg); }
        }

        /* Carousel */
        .carousel {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 1.5rem auto;
            overflow: hidden;
            border-radius: 12px;
            border: 2px solid var(--card-border);
            box-shadow: 0 4px 20px var(--shadow-color);
        }

        .carousel-track {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4;
            background: #000;
        }

        .carousel-slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            transform: scale(0.92);
            transition: opacity 0.6s ease, transform 0.6s ease;
            pointer-events: none;
        }

        .carousel-slide.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .carousel-slide.exit-left {
            opacity: 0;
            transform: translateX(-40%) scale(0.9);
        }

        .carousel-slide.exit-right {
            opacity: 0;
            transform: translateX(40%) scale(0.9);
        }

        .carousel-slide.enter-left {
            opacity: 0;
            transform: translateX(-40%) scale(0.9);
        }

        .carousel-slide.enter-right {
            opacity: 0;
            transform: translateX(40%) scale(0.9);
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: var(--image-filter);
            transition: filter var(--transition-speed) ease;
        }

        .carousel-controls {
            position: absolute;
            top: 50%;
            left: 0; right: 0;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 0.5rem;
            pointer-events: none;
            z-index: 5;
        }

        .carousel-btn {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            border: none;
            width: 36px; height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
            backdrop-filter: blur(4px);
        }

        .carousel-btn:hover {
            background: var(--hover-bg);
            color: var(--hover-text);
        }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 0.75rem 0;
            background: var(--card-bg);
        }

        .carousel-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            border: 1.5px solid var(--card-border);
            background: transparent;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
            padding: 0;
        }

        .carousel-dot.active {
            background: var(--text-color);
            transform: scale(1.3);
        }
        #banner {
            width: 100%;
            height: 200px;
            background-image: url('https://public.onlyfans.com/files/j/jd/jdc/jdcuvtfzw5ne5dolulri0zxwwwbwgnq31709177480/387693175/header.jpg');
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid var(--card-border);
            box-shadow: 0 4px 15px var(--shadow-color);
            transition: all var(--transition-speed) ease;
            filter: var(--image-filter);
            display: none;
            margin-bottom: 2rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 2.5rem;
            width: 100%;
        }

        .gallery-item {
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 12px;
            border: 2px solid var(--card-border);
            box-shadow: 0 4px 10px var(--shadow-color);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: var(--image-filter);
        }

        /* Hallucination Overlay */
        #hallucination-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease;
        }

        #hallucination-overlay.active {
            opacity: 1;
        }

        #hallucination-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.2);
            transform: scale(0.8);
            transition: transform 3s cubic-bezier(0.4, 0, 0.2, 1), filter 1s ease;
            filter: none; /* No color effect for screenshot */
        }

        #hallucination-overlay.active #hallucination-img {
            transform: scale(1);
        }
    </style>
</head>
<body>
    <div id="hallucination-overlay">
        <img id="hallucination-img" src="" alt="Hallucination">
    </div>
    <div id="banner"></div>
    
    <div class="header" id="mainHeader">
        <div class="profile-pic" id="avatar"></div>
        <h1 id="mainTitle">Sav 💕</h1>
        <p id="subTitle" style="opacity: 0.7;">You have to earn access.</p>
        <br>
        <button class="give-in-btn" id="giveInBtn" onclick="progressState()">Surrender</button>
    </div>

    <div class="vault-panel" id="vaultPanel">
        <h2 style="text-align: center; margin-bottom: 2rem;">The Vault is Open, Good puppy</h2>
        <a href="https://throne.com/redhotjugs" target="_blank" class="link-card">
            <span class="link-text">Throne | My Wishlist</span>
        </a>
        
        <a href="https://www.instagram.com/redhotjugs" target="_blank" class="link-card">
            <span class="link-text">Instagram</span>
        </a>

        <a href="https://onlyfans.com/redhotjugs" class="link-card">
            <span class="link-text">Spicy 🌶️</span>
        </a>
        
        <a href="http://twitter.com/redhotjugs" target="_blank" class="link-card">
            <span class="link-text">Twitter</span>
        </a>

        <a href="http://cash.app/$Sassysavvv" target="_blank" class="link-card">
            <span class="link-text">Cashapp ✨</span>
        </a>

        <div class="gallery-grid">
            <div class="gallery-item"><img src="assets/$Sassysavvv.svg" alt="Gallery Image"></div>
            <div class="gallery-item"><img src="assets/09CAFF8E-2D3D-4267-9A34-13ECE9D12593.png" alt="Gallery Image"></div>
            <div class="gallery-item"><img src="assets/926E8403-267A-4716-BE2E-667CCE454B03.jpeg" alt="Gallery Image"></div>
            <div class="gallery-item"><img src="assets/GTNg2UeaYAEKZc2.jpg" alt="Gallery Image"></div>
            <div class="gallery-item"><img src="assets/GVdM0DrXwAIEpC6.jpg" alt="Gallery Image"></div>
            <div class="gallery-item"><img src="assets/GYG5Ommb0AE95XD.jpg" alt="Gallery Image"></div>
            <div class="gallery-item"><img src="assets/GYxXMuhbQAQRmQu.jpg" alt="Gallery Image"></div>
            <div class="gallery-item"><img src="assets/IMG_7296.jpeg" alt="Gallery Image"></div>
        </div>
    </div>

    <script>
        // State Machine
        let currentState = 0;
        const maxStates = 3;
        
        // Tone.js Audio Elements
        let isAudioInitialized = false;
        let synth, distortion, autoFilter, droneGain;
        let hallucinationLoop;

        async function initAudio() {
            if (isAudioInitialized) return;
            
            await Tone.start();
            
            // Set initial BPM
            Tone.Transport.bpm.value = 60; 
            
            // Build the audio chain
            distortion = new Tone.Distortion(0).toDestination();
            autoFilter = new Tone.AutoFilter("4n").connect(distortion);
            droneGain = new Tone.Gain(0).connect(autoFilter);
            
            // Deep, low FM Synth for the background drone
            synth = new Tone.FMSynth({
                harmonicity: 1.5,
                modulationIndex: 2,
                oscillator: { type: "triangle" },
                modulation: { type: "square" }
            }).connect(droneGain);

            synth.triggerAttack("C1");
            autoFilter.start();

            // Create the hallucination loop
            hallucinationLoop = new Tone.Loop((time) => {
                // Only trigger hallucinations in state 3 (Vault Open)
                if (currentState === 3) {
                    Tone.Draw.schedule(() => {
                        triggerHallucination();
                    }, time);
                }
            }, "2m").start(0);

            Tone.Transport.start();
            isAudioInitialized = true;
        }

        function triggerHallucination() {
            const galleryImages = document.querySelectorAll('.gallery-grid img');
            if (galleryImages.length === 0) return;

            const randomImg = galleryImages[Math.floor(Math.random() * galleryImages.length)];
            const overlay = document.getElementById('hallucination-overlay');
            const overlayImg = document.getElementById('hallucination-img');

            overlayImg.src = randomImg.src;
            overlay.classList.add('active');

            // Stay visible for 4 seconds (enough for screenshot)
            setTimeout(() => {
                overlay.classList.remove('active');
            }, 4000);

            // Dynamically speed up the BPM slightly each time
            const currentBpm = Tone.Transport.bpm.value;
            if (currentBpm < 120) {
                Tone.Transport.bpm.rampTo(currentBpm + 2, 4);
            }
            
            // Intensify frequency over time
            if (hallucinationLoop.interval === "2m") hallucinationLoop.interval = "1m";
            else if (hallucinationLoop.interval === "1m") hallucinationLoop.interval = "30s";
            else if (hallucinationLoop.interval === "30s") hallucinationLoop.interval = "10s";
        }

        function updateAudioState() {
            if (!isAudioInitialized) return;
            
            // Increase intensity based on state
            const intensity = currentState / maxStates;
            
            // Ramp up volume, distortion, and modulation
            droneGain.gain.rampTo(intensity * 0.6, 1);
            distortion.distortion = intensity * 0.8;
            synth.modulationIndex.rampTo(2 + (intensity * 20), 1);
            autoFilter.frequency.value = (intensity * 8) + "n";
        }

        function updateUIState() {
            const root = document.documentElement;
            const intensity = currentState / maxStates;

            // Shift colors progressively
            if (currentState === 1) {
                root.style.setProperty('--bg-color', '#ff99aa');
                root.style.setProperty('--vignette', 'inset 0 0 50px rgba(255, 0, 51, 0.1)');
                document.getElementById('subTitle').innerText = "A little further...";
                document.getElementById('banner').style.display = 'block';
            } else if (currentState === 2) {
                root.style.setProperty('--bg-color', '#4a0011');
                root.style.setProperty('--text-color', '#ff0033');
                root.style.setProperty('--card-border', '#ff0033');
                root.style.setProperty('--btn-bg', '#ff0033');
                root.style.setProperty('--btn-text', '#000');
                root.style.setProperty('--crt-opacity', '0.5');
                root.style.setProperty('--vignette', 'inset 0 0 100px rgba(255, 0, 51, 0.4)');
                document.getElementById('subTitle').innerText = "Almost there.";
                document.getElementById('mainHeader').style.animation = "violent-shake 0.2s infinite";
                document.getElementById('banner').style.display = 'block';
            } else if (currentState === 3) {
                root.style.setProperty('--bg-color', '#050002');
                root.style.setProperty('--card-bg', 'rgba(15, 0, 5, 0.9)');
                root.style.setProperty('--crt-opacity', '1');
                root.style.setProperty('--vignette', 'inset 0 0 150px rgba(255, 0, 51, 0.6)');
                root.style.setProperty('--image-filter', 'grayscale(100%) contrast(180%) sepia(100%) hue-rotate(330deg) saturate(300%)');
                
                // Final UI changes
                document.getElementById('mainHeader').style.animation = "none";
                document.getElementById('giveInBtn').style.display = "none";
                document.getElementById('subTitle').innerText = "Access Granted.";
                document.getElementById('avatar').style.animation = "breathe 1s infinite";
                document.getElementById('banner').style.display = 'block';
                
                // Reveal the Vault
                document.getElementById('vaultPanel').classList.add('active');
            }
        }

        async function progressState() {
            if (currentState < maxStates) {
                if (!isAudioInitialized) {
                    await initAudio();
                }
                currentState++;
                updateAudioState();
                updateUIState();
            }
        }
    </script>
</body>
</html>
