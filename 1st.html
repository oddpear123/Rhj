<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sav's Links</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        /* Default: Pretty Princess Theme */
        :root {
            --bg-color: #ffe6ea;
            --text-color: #ff3366;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: #ffb3c6;
            --shadow-color: rgba(255, 179, 198, 0.6);
            --hover-bg: #ffb3c6;
            --hover-text: #fff;
            --font-family: 'Inter', sans-serif;
            --transition-speed: 0.8s;
            --glitch-opacity: 0;
            --image-filter: grayscale(0%) sepia(20%) hue-rotate(320deg);
        }

        /* Toggled: Barbie Demon Theme */
        [data-theme="demon"] {
            --bg-color: #0f0f0f;
            --text-color: #ff0033;
            --card-bg: rgba(20, 0, 5, 0.8);
            --card-border: #ff0033;
            --shadow-color: rgba(255, 0, 51, 0.8);
            --hover-bg: #ff0033;
            --hover-text: #000;
            --glitch-opacity: 1;
            --image-filter: grayscale(100%) contrast(150%) sepia(100%) hue-rotate(330deg) saturate(300%);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating background particles for princess mode */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4) 0%, transparent 60%);
            opacity: calc(1 - var(--glitch-opacity));
            transition: opacity var(--transition-speed);
            z-index: -1;
            animation: float 6s infinite ease-in-out;
        }

        /* Scanlines for demon mode */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 0, 51, 0.1) 3px, rgba(255, 0, 51, 0.1) 3px);
            opacity: var(--glitch-opacity);
            transition: opacity var(--transition-speed);
            pointer-events: none;
            z-index: 999;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            z-index: 10;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            background-image: url('https://ugc.production.linktr.ee/d71ebae8-a001-483a-aa09-a6ae0d842111_6AngKleAEBh9WZKVzbKgAA52kKV2.jpeg?io=true&size=thumbnail-stack_v1_0');
            background-size: cover;
            background-position: center;
            border: 3px solid var(--card-border);
            box-shadow: 0 0 15px var(--shadow-color);
            transition: all var(--transition-speed) ease;
            filter: var(--image-filter);
        }

        .profile-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 60px;
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 30px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease, border-color var(--transition-speed), background var(--transition-speed);
            backdrop-filter: blur(5px);
        }

        .link-card:hover {
            transform: translateY(-3px) scale(1.02);
            background: var(--hover-bg);
            color: var(--hover-text);
            box-shadow: 0 8px 25px var(--shadow-color);
        }

        /* The demon glitch hover effect */
        [data-theme="demon"] .link-card:hover {
            animation: shake 0.3s infinite;
            text-shadow: 2px 2px 0px #00f, -2px -2px 0px #f00;
        }

        .link-text {
            position: relative;
            z-index: 2;
            padding: 0 2rem;
            text-align: center;
        }

        .theme-toggle {
            margin-top: 3rem;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s;
            text-transform: lowercase;
            letter-spacing: 2px;
        }

        .theme-toggle:hover {
            opacity: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -2px) rotate(-1deg); }
            50% { transform: translate(-3px, 0px) rotate(1deg); }
            75% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -1px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-header">
            <div class="profile-pic"></div>
            <h1 class="profile-title">Sav 💕</h1>
        </div>

        <a href="https://throne.com/redhotjugs" target="_blank" class="link-card">
            <span class="link-text">Throne | My Wishlist</span>
        </a>

        <a href="#" class="link-card">
            <span class="link-text">Spicy 🌶️</span>
        </a>

        <a href="https://www.instagram.com/redhotjugs" target="_blank" class="link-card">
            <span class="link-text">Instagram</span>
        </a>

        <a href="http://twitter.com/redhotjugs" target="_blank" class="link-card">
            <span class="link-text">Twitter</span>
        </a>

        <a href="http://cash.app/$Sassysavvv" target="_blank" class="link-card">
            <span class="link-text">Cashapp ✨</span>
        </a>

        <button class="theme-toggle" onclick="toggleTheme()">[ corrupt ]</button>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'demon') {
                body.removeAttribute('data-theme');
                document.querySelector('.theme-toggle').innerText = '[ corrupt ]';
            } else {
                body.setAttribute('data-theme', 'demon');
                document.querySelector('.theme-toggle').innerText = '[ purify ]';
            }
        }
    </script>
</body>
</html>
